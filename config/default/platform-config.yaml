apiVersion: v1
kind: ConfigMap
metadata:
  name: kinugasa-recording-operator
data:
  POD_NAMESPACE: kinugasa-recording
  PUBLIC_MEDIA_HOST: 127.0.0.1
  MEDIA_NODE_PORT_MIN: "31000"
  MEDIA_NODE_PORT_MAX: "31099"
  LIVEKIT_URL: http://livekit:7880
  LIVEKIT_PUBLIC_URL: ws://127.0.0.1:30081
  LIVEKIT_ROOM: kinugasa-preview
  LIVEKIT_TOKEN_TTL: 5m
  VIDEO_FANOUT_IMAGE: kinugasa-recording/video-fanout:latest
  VIDEO_RECORDER_IMAGE: kinugasa-recording/video-recorder:latest
  VIDEO_UPLOADER_IMAGE: kinugasa-recording/video-uploader:latest
  LIVEKIT_INGRESS_IMAGE: kinugasa-recording/livekit-ingress:latest
  S3_CONFIG_MAP_NAME: kinugasa-recording-s3
  S3_SECRET_NAME: kinugasa-recording-s3
  RECORDING_VOLUME_SIZE: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kinugasa-recording-s3
data:
  S3_BUCKET: kinugasa-recording
  S3_REGION: us-east-1
  S3_ENDPOINT: ""
  S3_USE_PATH_STYLE: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit
data:
  livekit.yaml: |
    port: 7880
    redis:
      address: redis:6379
    rtc:
      tcp_port: 7881
      udp_port: 7882
      use_external_ip: false
      node_ip: 127.0.0.1
    ingress:
      whip_base_url: http://livekit-ingress-service:8080/whip
    logging:
      level: info
