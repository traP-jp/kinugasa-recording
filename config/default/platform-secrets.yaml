# Replace these development values before deploying outside an isolated environment.
apiVersion: v1
kind: Secret
metadata:
  name: kinugasa-recording-livekit
type: Opaque
stringData:
  api-key: devkey
  api-secret: replace-with-at-least-32-characters
  keys: '{"devkey":"replace-with-at-least-32-characters"}'
  ingress.yaml: |
    log_level: info
    api_key: devkey
    api_secret: replace-with-at-least-32-characters
    ws_url: ws://livekit:7880
    redis:
      address: redis:6379
---
# AWS SDK-compatible credentials. Use a secret manager or encrypted manifest in production.
apiVersion: v1
kind: Secret
metadata:
  name: kinugasa-recording-s3
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: REPLACE_ME
  AWS_SECRET_ACCESS_KEY: REPLACE_ME
