apiVersion: v1
kind: Secret
metadata:
  name: garage-config
type: Opaque
stringData:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "sqlite"

    replication_factor = 1

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "garage:3901"
    rpc_secret = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.garage.localhost"
---
apiVersion: v1
kind: Service
metadata:
  name: garage
spec:
  selector:
    app.kubernetes.io/name: garage
  ports:
    - name: s3
      port: 3900
      targetPort: s3
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
spec:
  serviceName: garage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
    spec:
      enableServiceLinks: false
      containers:
        - name: garage
          image: dxflrs/garage:v2.3.0
          imagePullPolicy: IfNotPresent
          command: [/garage]
          args: [server, --single-node, --default-bucket]
          env:
            - name: GARAGE_DEFAULT_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: kinugasa-recording-s3
                  key: AWS_ACCESS_KEY_ID
            - name: GARAGE_DEFAULT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kinugasa-recording-s3
                  key: AWS_SECRET_ACCESS_KEY
            - name: GARAGE_DEFAULT_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: kinugasa-recording-s3
                  key: S3_BUCKET
          ports:
            - name: s3
              containerPort: 3900
            - name: rpc
              containerPort: 3901
          readinessProbe:
            tcpSocket:
              port: s3
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
            - name: storage
              mountPath: /var/lib/garage
      volumes:
        - name: config
          secret:
            secretName: garage-config
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
